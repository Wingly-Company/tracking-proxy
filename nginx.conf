events {}
http {
    map $http_x_forwarded_for $original_client_ip {
    "~^([^,]+)" $1;
    default "";
    }
    server {
        listen 80 default backlog=16384;
        listen [::]:80 default backlog=16384;

        # CDN assets (JS SDK and all async modules)
        location /libs/ {
            proxy_ssl_server_name on;
            proxy_set_header Host cdn.mxpnl.com;
            proxy_pass https://cdn.mxpnl.com/libs/;
        }

        # Tracking endpoints → api.mixpanel.com
        location / {
            proxy_set_header Host api-eu.mixpanel.com;
            proxy_set_header X-Real-IP $original_client_ip;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Host $server_name;
            proxy_pass https://api-eu.mixpanel.com/;
        }
    }
}
